site_name: no8s-operator
site_description: A Kubernetes-style controller for managing infrastructure without Kubernetes
site_url: https://wilsonge.github.io/no8s-operator/
repo_url: https://github.com/wilsonge/no8s-operator
repo_name: wilsonge/no8s-operator

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
  - Concepts:
    - Resource Types: resource-types.md
    - Resources: resources.md
    - Admission Controllers: admission-controllers.md
    - Users & RBAC: users.md
    - Leader Election: leader-election.md
  - Extending:
    - Writing a Reconciler: writing-a-reconciler.md
    - Action Plugins: action-plugins.md
